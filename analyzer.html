<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aorta Flow - Professional Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">Aorta <span>Project</span></a>
        <ul class="nav-links">
            <li><a href="scrollytelling.html">Story</a></li>
            <li><a href="analyzer.html" class="active">Expert Analyzer</a></li>
            <li><a href="index.html">Dashboard</a></li>
        </ul>
        <div class="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    <div id="gizmo-container" style="position: absolute; top: 10px; left: 10px; width: 120px; height: 120px; z-index: 100; cursor: pointer;"></div>
    <div id="canvas-container"></div>
    <div id="pulse-flash" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(255,0,0,0) 40%, rgba(255,0,0,0.15) 100%); pointer-events: none; opacity: 0; transition: opacity 0.1s;"></div>
    <div id="pulse-monitor" style="position: absolute; bottom: 30px; left: 30px; width: 340px; height: 140px; background: rgba(0,0,0,0.85); border: 1px solid #444; border-radius: 12px; color: white; padding: 15px; font-family: monospace; pointer-events: none; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.8); backdrop-filter: blur(5px);">
        <div style="display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px solid #333; padding-bottom: 8px; letter-spacing: 1px;">
            <span>CARDIAC ANALYZER</span>
            <span id="pulse-phase" style="color: #ff3300; font-weight: bold;">SYSTOLE</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="pressure-bar-container" style="width: 12px; height: 60px; background: #111; border-radius: 3px; overflow: hidden; position: relative; border: 1px solid #333;">
                <div id="pressure-bar" style="width: 100%; height: 50%; background: linear-gradient(to top, #00d4ff, #ff3300); position: absolute; bottom: 0; transition: height 0.05s;"></div>
            </div>
            <canvas id="pulse-canvas" width="280" height="60" style="width: 100%; height: 60px; background: rgba(5,5,5,0.5); border-radius: 4px;"></canvas>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #666; padding-top: 5px;">
            <span>DRUCK (mmHg)</span>
            <div style="display: flex; gap: 20px;">
                <span>SYS. PEAK</span>
                <span>DIA. REST</span>
            </div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>
    <script type="module" src="js/modules/analyzer.js"></script>
</body>
</html>
